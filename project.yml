name: Cartograph
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  xcodeVersion: "26.3"

settings:
  base:
    SWIFT_VERSION: "5"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
    SWIFT_OBJC_BRIDGING_HEADER: Cartograph/Cartograph-Bridging-Header.h

targets:
  Cartograph:
    type: application
    platform: macOS
    sources:
      - path: Cartograph
        excludes:
          - "*.md"
    entitlements:
      path: Cartograph/Cartograph.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
    dependencies:
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: MetalPerformanceShaders.framework
      - sdk: Accelerate.framework
      - sdk: CoreText.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.cartograph
        INFOPLIST_FILE: Cartograph/App/Info.plist

  CartographTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: CartographTests
    dependencies:
      - target: Cartograph
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_OBJC_BRIDGING_HEADER: Cartograph/Cartograph-Bridging-Header.h
